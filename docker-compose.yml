services:
  cctv-streamlit:
    build: .
    container_name: cctv-monitor
    restart: always
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./cctv_monitor.db:/app/cctv_monitor.db
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Taipei
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  default:
    name: cctv-network
